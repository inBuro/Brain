StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Trading

Packages = Microsoft, write-good

[*.md]
BasedOnStyles = Vale, Microsoft, write-good

# Relax overly strict rules for trading wiki:
# - Headings: technical wiki uses many capitalized terms (RSI, MACD, FOMC)
Microsoft.Headings = NO
# - Acronyms are pervasive (BB, EMA, OI, TF, R:R) — don't force expansion
Microsoft.Acronyms = NO
# - Wordiness: prose is intentionally explicit for instructional clarity
Microsoft.Wordiness = warning
# - "We" is fine for collaborative knowledge base
Microsoft.We = NO
# - Spaced em-dashes are deliberate stylistic choice (clearer in markdown)
Microsoft.Dashes = NO
# - "1D / 4h / 1h" trading notation triggers DateOrder false positives
Microsoft.DateOrder = NO
# - Adverbs like "really", "partially" sometimes carry meaning in technical text
Microsoft.Adverbs = suggestion

# - E-Prime forbids "is/was/are/were" — too aggressive for prose, off
write-good.E-Prime = NO
# - Passive voice: useful but noisy on rule statements ("SL is placed at...")
write-good.Passive = suggestion
# - "So" at sentence start sometimes used for natural transitions
write-good.So = suggestion

# - Reading time / weasel words kept as warnings
