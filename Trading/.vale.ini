StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Trading

Packages = Microsoft, write-good

[*.md]
BasedOnStyles = Vale, Microsoft, write-good

# Relax overly strict rules for trading wiki:
# - Headings: technical wiki uses many capitalized terms (RSI, MACD, FOMC)
Microsoft.Headings = NO
# - Acronyms are pervasive (BB, EMA, OI, TF, R:R) — don't force expansion
Microsoft.Acronyms = NO
# - Wordiness: prose is intentionally explicit for instructional clarity
Microsoft.Wordiness = warning
# - "We" is fine for collaborative knowledge base
Microsoft.We = NO
# - Spaced em-dashes are deliberate stylistic choice (clearer in markdown)
Microsoft.Dashes = NO
# - "1D / 4h / 1h" trading notation triggers DateOrder false positives
Microsoft.DateOrder = NO
# - Adverbs like "really", "partially" sometimes carry meaning in technical text
Microsoft.Adverbs = suggestion
# - Hyphens: false positives on wiki-link filenames like [[daily-routine]]
Microsoft.Hyphens = NO
# - Heading acronyms: technical headings legitimately contain RSI, MACD, BOLL
Microsoft.HeadingAcronyms = NO
# - Ellipses: "≥±5% / ±3...±5% / ±1...±3%" notation needs ranges
Microsoft.Ellipses = NO
# - Smart quotes vs straight: markdown source uses straight intentionally
Microsoft.Quotes = NO
# - HeadingColons: log entries use date-prefix "## YYYY-MM-DD — title" — colon-after-date is fine
Microsoft.HeadingColons = NO
# - "agent" is the standard term in skills/AI context, not "personal digital assistant"
Microsoft.Terms = NO
# - "Auto-fix" hyphenation flag false-positive on technical compounds
Microsoft.Auto = NO
# - First-person voice acceptable in memory/feedback files (notes about myself)
Microsoft.FirstPerson = suggestion
# - Foreign abbreviations (e.g., i.e.) disable globally — too rigid for personal docs
Microsoft.Foreign = suggestion

# - E-Prime forbids "is/was/are/were" — too aggressive for prose, off
write-good.E-Prime = NO
# - Passive voice: useful but noisy on rule statements ("SL is placed at...")
write-good.Passive = suggestion
# - "So" at sentence start sometimes used for natural transitions
write-good.So = suggestion
# - TooWordy flags precise technical terms (minimum/maximum/evaluate); too noisy
write-good.TooWordy = suggestion
# - Weasel words: "several", "few" sometimes the most accurate phrasing available
write-good.Weasel = suggestion

# - Reading time / weasel words kept as warnings
