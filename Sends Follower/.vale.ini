StylesPath = ../Trading/.vale/styles
MinAlertLevel = warning
Vocab = SendsFollower

Packages = Microsoft, write-good

[*.md]
BasedOnStyles = Vale, Microsoft, write-good

# Technical M4L wiki: many capitalized object names and acronyms (LiveAPI, JS, CC, LFO).
Microsoft.Headings = NO
Microsoft.Acronyms = NO
Microsoft.We = NO
Microsoft.Dashes = NO
Microsoft.Hyphens = NO
Microsoft.HeadingAcronyms = NO
Microsoft.Quotes = NO
Microsoft.HeadingColons = NO
Microsoft.Terms = NO
Microsoft.Auto = NO
Microsoft.FirstPerson = suggestion
Microsoft.Foreign = suggestion
Microsoft.Adverbs = suggestion
Microsoft.Wordiness = warning
# Formal technical reference deliberately spells out "it is"/"does not" for precision.
Microsoft.Contractions = NO
# "-100...+100" etc. are mono-spaced range notations; en-dashing the minus hurts readability.
Microsoft.Negative = NO
# Vale.Terms only fires on the lowercase "liveapi" inside wiki-link slugs (filenames must stay
# lowercase-hyphenated); the visible link text and all prose already read "LiveAPI" correctly.
Vale.Terms = NO

write-good.E-Prime = NO
write-good.Passive = suggestion
write-good.So = suggestion
write-good.TooWordy = suggestion
write-good.Weasel = suggestion
